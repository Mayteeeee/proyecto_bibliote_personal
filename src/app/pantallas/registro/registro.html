<div class="app-contenedor">
    <div class="tarjeta-pantalla">
        <button class="btn-regresar" routerLink="/login" aria-label="Regresar al login" title="Regresar">
            <i class="bi bi-arrow-left"></i>
        </button>

        <h2>Crear cuenta</h2>

        <form class="formulario" (submit)="registrarUsuario($event)">
            <div class="grupo-input">
                <span class="icono">👤</span>
                <input type="text" placeholder="Nombre completo" required />
            </div>

            <div class="grupo-input">
                <span class="icono">✉️</span>
                <input type="email" placeholder="Correo electrónico" required />
            </div>

            <div class="grupo-input">
                <span class="icono">🔒</span>
                <input [type]="mostrarPassword ? 'text' : 'password'" placeholder="Contraseña" required />
                <button type="button" class="btn-eye" (click)="togglePassword()">
                    {{ mostrarPassword ? '🙈' : '👁️' }}
                </button>
            </div>

            <div class="grupo-input">
                <span class="icono">🔒</span>
                <input [type]="mostrarConfirmarPassword ? 'text' : 'password'" placeholder="Confirmar contraseña" required />
                <button type="button" class="btn-eye" (click)="toggleConfirmarPassword()">
                    {{ mostrarConfirmarPassword ? '🙈' : '👁️' }}
                </button>
            </div>

            <button type="submit" class="btn-registrarse" (click)="registrarUsuario($event)">Registrarse</button>
        </form>

        <p class="login-link">
            ¿Ya tienes cuenta? <a routerLink="/login">Inicia sesión</a>
        </p>
    </div>
</div>

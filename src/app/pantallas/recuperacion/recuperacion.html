<div class="app-contenedor" style="justify-content: center; align-items: center; background-color: #ffffff;">
  <div style="width: 100%; max-width: 500px; padding: 30px; box-sizing: border-box;">
    
    <div style="margin-bottom: 30px;">
      <span style="cursor: pointer; color: #5d24b3; font-weight: bold; font-size: 24px; display: inline-flex; align-items: center;">
        ‹
      </span>
    </div>

    <div style="text-align: center; font-size: 65px; margin-bottom: 20px;">
      📖
    </div>

    <h2 style="text-align: center; margin: 0 0 12px 0; color: #333; font-size: 24px; font-weight: bold;">¿Olvidaste tu contraseña?</h2>
    
    <p style="text-align: center; color: #666; font-size: 15px; margin: 0 10px 30px 10px; line-height: 1.5;">
      Ingresa tu correo electrónico y te enviaremos un código para restablecer tu contraseña.
    </p>

    <div style="text-align: center; font-size: 60px; margin-bottom: 35px; filter: drop-shadow(0px 4px 8px rgba(0,0,0,0.06));">
      ✉️
    </div>

    <form>
      <label style="font-weight: 600; font-size: 15px; color: #444; display: block; margin-bottom: 6px;">
        Correo electrónico
      </label>
      <input type="email" class="campo-texto" placeholder="ejemplo@correo.com" style="padding: 14px; font-size: 15px;">

      <button type="button" class="boton-morado" style="margin-top: 10px; padding: 16px; font-size: 16px;">
        Enviar código
      </button>
    </form>

    <p style="text-align: center; margin-top: 25px; font-size: 15px;">
      <span style="color: #5d24b3; font-weight: bold; cursor: pointer;">
        Volver al inicio de sesión
      </span>
    </p>

    <div style="background-color: #f3ebff; border-radius: 8px; padding: 15px; margin-top: 35px; display: flex; gap: 12px; align-items: center;">
      <span style="font-size: 20px;">ℹ️</span>
      <p style="margin: 0; font-size: 14px; color: #5d24b3; line-height: 1.4; font-weight: 500;">
        Revisa tu carpeta de spam si no recibes el correo.
      </p>
    </div>

  </div>
</div>
